<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock Paper Scissors Game</h1>
    <div id="container">
        <button class="button" id="rock" onclick="playGame('rock')"><img src="img/rock.png" alt="Rock"></button>
        <button class="button" id="paper" onclick="playGame('paper')"><img src="img/paper.png" alt="Paper"></button>
        <button class="button" id="scissors" onclick="playGame('scissors')"><img src="img/scissors.png" alt="Scissors"></button>
    </div>
    <p id="result"></p>
    <br><br><br><br><br><br><br><br><br>
    <div id="bot_choice">
        <button class="button" id="botrock" ><img src="img/rock.png" alt="Rock"></button>
        <button class="button" id="botpaper" ><img src="img/paper.png" alt="Paper"></button>
        <button class="button" id="botscissors" ><img src="img/scissors.png" alt="Scissors"></button>
    
    </div>
    <script src="main.js"></script>
</body>
</html>
